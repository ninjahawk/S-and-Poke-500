<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found — S&amp;Poké 500</title>
  <meta name="robots" content="noindex" />
  <!-- Absolute path: the 404 page serves at any URL depth. ?v=2 busts the old
       inline-SVG favicon that browsers (Safari especially) cached per-domain. -->
  <link rel="icon" type="image/png" href="/logo.png?v=2" />
  <style>
    :root { --bg: #ffffff; --ink: #1f1f1f; --muted: #5f6368; --link: #0b57d0; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #131314; --ink: #e8eaed; --muted: #9aa0a6; --link: #a8c7fa; }
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh; display: grid; place-items: center; padding: 24px;
    }
    main { text-align: center; max-width: 28rem; }
    .mark { margin-bottom: 18px; }
    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 8px; }
    p { color: var(--muted); margin-bottom: 20px; }
    a.home {
      color: var(--link); text-decoration: none; font-weight: 600;
    }
    a.home:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 100 100" width="48" height="48"><rect x="4" y="4" width="92" height="92" rx="22" fill="#d93a2b"/><path d="M20 66 L40 46 L54 58 L80 30" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><path d="M80 30 l0 16 M80 30 l-16 0" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/></svg>
    </div>
    <h1>404 — this card isn't in the index</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a class="home" href="/">← Back to the S&amp;Poké 500</a>
  </main>
</body>
</html>
