name: Update S&Poke 500 index

# Rebuilds the index from live TCGCSV (TCGplayer) prices and commits the
# refreshed data files. Runs hourly, but build_index.py checks TCGCSV's
# last-updated stamp first and exits early unless there's actually a new
# daily snapshot (TCGCSV refreshes ~20:05 UTC), so most runs are one tiny
# request. Scheduled runs only fire on the default branch (GitHub rule);
# use the "Run workflow" button (workflow_dispatch) to run it anywhere.
on:
  schedule:
    - cron: "23 * * * *" # hourly at :23
  workflow_dispatch: {}

# Prevent overlapping runs from racing on the commit.
concurrency:
  group: update-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build index (fetch prices, recompute)
        run: python3 scripts/build_index.py

      - name: Commit updated data
        run: |
          git config user.name "spoke-500-bot"
          git config user.email "actions@github.com"
          git add docs/data/latest.json docs/data/history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update S&Poke 500 index ($(date -u +%Y-%m-%d))"
            git push
          fi

      # No-op until the BUTTONDOWN_API_KEY repo secret exists. The script
      # itself enforces the weekly cadence (Fridays, first issue immediately)
      # and only sends from the build that ingested TODAY's TCGCSV snapshot.
      - name: Send weekly newsletter (Buttondown)
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python3 scripts/send_newsletter.py

      # After a send, the script snapshots constituent prices into
      # newsletter_state.json so next week's issue can report week-over-week
      # movers. Commit it so the baseline survives to the next run.
      - name: Persist newsletter state
        run: |
          # The state file only exists once the first issue has been sent;
          # until then this step is a no-op (git add on a missing path fails
          # the whole run otherwise).
          if [ ! -f docs/data/newsletter_state.json ]; then
            echo "No newsletter state file yet (no issue sent)."
            exit 0
          fi
          git add docs/data/newsletter_state.json
          if git diff --cached --quiet; then
            echo "No newsletter state change."
          else
            git commit -m "chore: record newsletter issue ($(date -u +%Y-%m-%d))"
            git push
          fi
