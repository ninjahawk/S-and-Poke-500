name: Update S&Poke 500 index

# Rebuilds the index from live TCGCSV (TCGplayer) prices and commits the
# refreshed data files. Runs hourly, but build_index.py checks TCGCSV's
# last-updated stamp first and exits early unless there's actually a new
# daily snapshot (TCGCSV refreshes ~20:05 UTC), so most runs are one tiny
# request. Scheduled runs only fire on the default branch (GitHub rule);
# use the "Run workflow" button (workflow_dispatch) to run it anywhere.
on:
  schedule:
    - cron: "23 * * * *" # hourly at :23
  workflow_dispatch: {}

# Prevent overlapping runs from racing on the commit.
concurrency:
  group: update-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build index (fetch prices, recompute)
        run: python3 scripts/build_index.py

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "spoke-500-bot"
          git config user.email "actions@github.com"
          git add docs/data/latest.json docs/data/history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update S&Poke 500 index ($(date -u +%Y-%m-%d))"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # Email the daily close to Buttondown subscribers. Only runs when this
      # build actually committed new data; the script itself additionally
      # refuses to send unless prices are genuinely fresh (snapshot date ==
      # index date) and no email for the date exists yet. A failure here must
      # never fail the data build.
      - name: Send daily-close email
        if: steps.commit.outputs.committed == 'true'
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python3 scripts/send_daily_email.py || echo "::warning::Daily email failed; index build unaffected."
